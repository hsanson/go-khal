name: CI

on:
  pull_request:
    branches:
      - main
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  checks:
    name: Lint, Test, Build
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest
          args: ./...

      - name: Test
        run: make test

      - name: Build
        run: make build

  release:
    name: Release
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag is on main
        run: |
          git fetch origin main
          [[ "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]
          tag_commit="$(git rev-list -n 1 "$GITHUB_REF_NAME")"
          git merge-base --is-ancestor "$tag_commit" origin/main

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build release artifacts
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -eu
          mkdir -p dist

          build() {
            os="$1"
            arch="$2"
            ext="$3"
            name="go-khal_${VERSION}_${os}_${arch}"
            bin="go-khal${ext}"

            GOOS="$os" GOARCH="$arch" go build -trimpath -ldflags "-s -w" -o "dist/${bin}" .

            if [ "$os" = "windows" ]; then
              (cd dist && zip "${name}.zip" "${bin}")
            else
              tar -C dist -czf "dist/${name}.tar.gz" "${bin}"
            fi

            rm "dist/${bin}"
          }

          build linux amd64 ""
          build linux arm64 ""
          build darwin arm64 ""
          build windows amd64 ".exe"

          (cd dist && sha256sum * > SHA256SUMS)

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/SHA256SUMS
          body_path: dist/SHA256SUMS
